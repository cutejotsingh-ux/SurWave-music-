<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Song Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
      text-align: center;
      padding: 50px;
    }
    .container {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    textarea {
      width: 100%;
      height: 100px;
      border-radius: 5px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #e68900;
    }
    .output {
      margin-top: 30px;
      font-size: 18px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 AI Song Generator 🎵</h1>
    <p>अपना टेक्स्ट डालें और गाना जनरेट करें:</p>
    <textarea id="songInput" placeholder="यहाँ अपने गाने का आइडिया लिखें..."></textarea>
    <br>
    <button onclick="generateSong()">Generate Song</button>
    <div class="output" id="songOutput"></div>
  </div>

  <script>
    function generateSong() {
      let input = document.getElementById("songInput").value;
      let output = document.getElementById("songOutput");

      if(input.trim() === "") {
        output.innerHTML = "कृपया पहले कुछ टेक्स्ट डालें!";
      } else {
        // यहाँ आप AI API को कॉल कर सकते हैं
        output.innerHTML = "🎶 Generated Song Lyrics: <br><br>" + 
                           "यहाँ आपके टेक्स्ट के आधार पर गाना बनेगा: <br>" + input;
      }
    }
  </script>
</body>
</html>
